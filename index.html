<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard</title>
    <style>
        /* Modern CSS Variables for easy theme switching */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --border-color: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f5f5f5;
            --primary-color: #357abd;
            --border-color: #444444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin: 10px 0;
        }

        .btn:hover {
            opacity: 0.9;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-color);
            resize: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .counter-container {
            text-align: right;
            font-size: 0.9rem;
            margin-top: 5px;
            color: #777;
        }

        .toggle-container {
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="greeting">Hello!</h1>
        <p>Welcome to this interactive space.</p>
        
        <div style="margin: 20px 0; text-align: left;">
            <label for="textInput" style="font-weight: bold; display: block; margin-bottom: 8px;">Type something below:</label>
            <textarea id="textInput" placeholder="Start typing here..."></textarea>
            <div class="counter-container">
                Characters: <span id="charCount" style="font-weight: bold; color: var(--primary-color);">0</span>
            </div>
        </div>

        <div class="toggle-container">
            <button class="btn" id="themeToggle">Switch to Dark Mode</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const greetingEl = document.getElementById('greeting');
        const textInputEl = document.getElementById('textInput');
        const charCountEl = document.getElementById('charCount');
        const themeToggleBtn = document.getElementById('themeToggle');

        // Feature 1: Dynamic Greeting based on time of day
        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = "Good evening!";
            
            if (hour < 12) {
                greeting = "Good morning!";
            } else if (hour < 18) {
                greeting = "Good afternoon!";
            }
            
            greetingEl.textContent = greeting;
        }

        // Feature 2: Character Counter Event Listener
        textInputEl.addEventListener('input', () => {
            const count = textInputEl.value.length;
            charCountEl.textContent = count;
        });

        // Feature 3: Dark Mode Toggle Event Listener
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggleBtn.textContent = 'Switch to Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggleBtn.textContent = 'Switch to Light Mode';
            }
        });

        // Initialize greeting on page load
        updateGreeting();
    </script>
</body>
</html>
